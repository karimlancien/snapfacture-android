name: Build APK

on:
  push:
    branches:
      - "claude/**"
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.10.2 --distribution-type=bin

      - name: Build debug APK
        shell: bash
        run: |
          set -eo pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit build log to repo on failure
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p .ci-logs
          {
            echo "# Build log for ${{ github.sha }}"
            echo ""
            echo "## Kotlin errors (grep e:)"
            echo '```'
            grep -E "^e:" build.log || echo "(none)"
            echo '```'
            echo ""
            echo "## Last 200 lines of build.log"
            echo '```'
            tail -n 200 build.log
            echo '```'
          } > .ci-logs/last-failure.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ci-logs/last-failure.md
          git commit -m "ci: capture build log for ${{ github.sha }} [skip ci]" || echo "nothing to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Locate and rename APK
        run: |
          set -e
          mkdir -p artifact
          echo "::group::APK candidates"
          find app/build/outputs -name "*.apk" -print || true
          echo "::endgroup::"
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found under app/build/outputs/apk/debug"
            echo "::group::Tail of build.log"
            tail -n 200 build.log || true
            echo "::endgroup::"
            exit 1
          fi
          echo "Found APK: $APK"
          cp "$APK" artifact/ohmybattery-debug.apk
          ls -lh artifact/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohmybattery-debug-apk
          path: artifact/ohmybattery-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          body: |
            Build automatique du dernier commit sur ${{ github.ref_name }}.
            Commit: ${{ github.sha }}
          files: artifact/ohmybattery-debug.apk
          prerelease: true
          make_latest: false
